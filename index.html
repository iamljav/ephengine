    <title>riot laboratories</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: "Courier New", Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo Top Center */
        header {
            padding-top: 50px;
        }

        .logo {
            max-width: 120px;
            height: auto;
        }

        /* Main Content / Figure */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .figure-container img {
            max-width: 350px; /* Adjust based on your preference */
            width: 100%;
            height: auto;
            margin-bottom: 25px;
        }

        /* Baseline Text */
        .baseline {
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            margin-bottom: 25px;
        }

        /* Social Icons */
        .socials {
            display: flex;
            gap: 25px;
        }

        .socials a {
            color: #fff;
            transition: opacity 0.2s;
        }

        .socials a:hover {
            opacity: 0.5;
        }

        .socials svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
