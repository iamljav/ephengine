<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>riot laboratories</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #ffffff;
            color: #000;
            font-family: "Courier New", Courier, monospace;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            padding: 30px 0; /* Reduced padding to lift logo and lower icons */
            box-sizing: border-box;
        }

        header {
            flex-shrink: 0;
            margin-top: 20px;
        }

        .logo {
            max-width: 42px; /* Slightly smaller for that 2.jpg feel */
            height: auto;
        }

        /* Central Group: Image + Baseline locked tight */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            flex-grow: 1;
            justify-content: center;
        }

        .figure-container img {
            max-width: 550px; /* Increased by 25% for dominance */
            width: 90vw;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .baseline {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-top: 5px; /* Minimal gap as requested */
            font-weight: bold;
        }

        footer {
            flex-shrink: 0;
            margin-bottom: 20px;
        }

        .socials {
            display: flex;
            gap: 20px;
        }

        .socials a {
            color: #000;
            transition: color 0.2s ease;
            text-decoration: none;
        }

        /* Hover color matched to the gnome figure */
        .socials a:hover {
            color: #a31d4b; 
        }

        .socials svg {
            width: 20px; /* Smaller, more delicate icons */
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.2; /* Lighter stroke for precision */
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <img src="assets/logo.png" alt="riot laboratories" class="logo">
        </header>

        <main>
            <div class="figure-container">
                <img src="assets/background.png" alt="figure">
                <div class="baseline">
                    NON COMPLIANT SINCE Y2K
                </div>
            </div>
        </main>

        <footer class="socials">
            <a href="https://instagram.com" target="_blank" aria-label="Instagram">
                <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.5" y2="6.5"></line></svg>
            </a>
            <a href="mailto:contact@riotlaboratories.com" aria-label="Email">
                <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </a>
            <a href="#" target="_blank" aria-label="Shop">
                <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            </a>
        </footer>
    </div>

</body>
</html>
