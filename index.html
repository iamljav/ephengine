<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>riot laboratories</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('assets/background.png') no-repeat center center fixed;
            background-size: cover;
            z-index: -1;
        }

        .container {
            text-align: center;
        }

        .logo {
            max-width: 180px;
            height: auto;
            margin-bottom: 30px;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .socials a {
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            text-transform: lowercase;
            opacity: 0.8;
            transition: opacity 0.2s ease;
        }

        .socials a:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="container">
        <img src="assets/logo.png" alt="riot laboratories" class="logo">
        
        <div class="socials">
            <a href="mailto:contact@riotlaboratories.com">email</a>
            <a href="#" target="_blank">x</a>
            <a href="#" target="_blank">instagram</a>
        </div>
    </div>

</body>
</html>
