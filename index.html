<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>riot laboratories</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            /* 2. Background white */
            background-color: #ffffff; 
            color: #000; /* Text needs to be black on white */
            font-family: "Courier New", Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo Top Center */
        header {
            padding-top: 50px;
        }

        .logo {
            /* 1. Logo 60% smaller (original max-width 120px * 0.4) */
            max-width: 48px;
            height: auto;
        }

        /* Main Content / Figure */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .figure-container img {
            max-width: 350px;
            width: 100%;
            height: auto;
            margin-bottom: 25px;
        }

        /* Baseline Text */
        .baseline {
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            margin-bottom: 25px;
        }

        /* Social Icons */
        .socials {
            display: flex;
            gap: 25px;
        }

        .socials a {
            color: #000; /* Icons need to be black on white */
            transition: opacity 0.2s;
        }

        .socials a:hover {
            opacity: 0.5;
        }

        .socials svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>

    <header>
        <img src="assets/logo.png" alt="riot laboratories" class="logo">
    </header>
